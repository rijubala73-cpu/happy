<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>শুভ নববর্ষ</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.glass{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    padding:25px;
    border-radius:20px;
    text-align:center;
    width:85%;
}

input{
    padding:10px;
    width:80%;
    border:none;
    border-radius:10px;
    text-align:center;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:25px;
    margin-top:10px;
    cursor:pointer;
    background:linear-gradient(45deg,#ff512f,#dd2476);
    color:white;
}

#main{
    display:none;
}

.title{
    font-size:30px;
    background:linear-gradient(90deg,#ffdf40,#ff4ecd,#40e0ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
</style>
</head>

<body>

<!-- INPUT -->
<div id="startScreen" class="glass">
    <h2>তোমার নাম লিখো 🎉</h2>
    <input id="nameInput" placeholder="Enter your name">
    <br>
    <button onclick="go()">Go Ahead 🚀</button>
</div>

<!-- MAIN -->
<div id="main" class="glass">
    <h1 class="title">✨ শুভ নববর্ষ ✨</h1>

    <h2 id="wish"></h2>
    <p id="msg"></p>

    <button onclick="share()">Share 🔗</button>

    <small>thanks by Utsa bala Riju</small>
</div>

<script>

/* START */
function go(){
    let name = document.getElementById("nameInput").value;

    if(name.trim() === ""){
        name = "Friend";
    }

    document.getElementById("startScreen").style.display="none";
    document.getElementById("main").style.display="block";

    document.getElementById("wish").innerText =
    `শুভ নববর্ষ, ${name} ✨`;

    document.getElementById("msg").innerText =
    `প্রিয় ${name},
নতুন বছর তোমার জীবনে আনুক সুখ, শান্তি ও সাফল্য ✨`;
}

/* SHARE FIXED */
function share(){
    let name = document.getElementById("wish").innerText.split(",")[1] || "Friend";

    let link = window.location.href + "?name=" + encodeURIComponent(name.trim());
    navigator.clipboard.writeText(link);

    alert("Link copied 🔗");
}
</script>

</body>
</html>
